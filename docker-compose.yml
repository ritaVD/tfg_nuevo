version: "3.9"

# ── TFGdaw — Plataforma de Clubes de Lectura ─────────────────────────────────
# Puesta en marcha:  docker compose up --build -d
# Abrir en browser:  http://localhost
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Base de datos MariaDB ───────────────────────────────────────────────────
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MARIADB_DATABASE: ${DB_NAME:-tfgdaw}
      MARIADB_USER: ${DB_USER:-tfgdaw}
      MARIADB_PASSWORD: ${DB_PASSWORD:-tfgdaw_secret}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - backend

  # ── PHP-FPM (Symfony) ───────────────────────────────────────────────────────
  php:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET:-changeme_use_random_32chars}
      DATABASE_URL: "mysql://${DB_USER:-tfgdaw}:${DB_PASSWORD:-tfgdaw_secret}@db:3306/${DB_NAME:-tfgdaw}?serverVersion=mariadb-10.11"
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY:-}
      MAILER_DSN: ${MAILER_DSN:-null://null}
      MESSENGER_TRANSPORT_DSN: doctrine://default?auto_setup=0
    volumes:
      # Persistir logs y caché entre reinicios opcionales
      - php_var:/var/www/html/var
      # Volumen compartido con nginx para servir archivos subidos
      - uploads:/var/www/html/public/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

  # ── Frontend React (build estático servido por Nginx) ──────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - frontend

  # ── Nginx (reverse proxy principal) ────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Acceso a los archivos subidos del backend
      - uploads:/var/www/html/public/uploads:ro
    depends_on:
      - php
      - frontend
    networks:
      - backend
      - frontend

# ── Migraciones (job de un solo uso) ───────────────────────────────────────
# Ejecutar manualmente tras el primer despliegue:
#   docker compose run --rm migrate
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    entrypoint: >
      sh -c "
        php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration
      "
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET:-changeme_use_random_32chars}
      DATABASE_URL: "mysql://${DB_USER:-tfgdaw}:${DB_PASSWORD:-tfgdaw_secret}@db:3306/${DB_NAME:-tfgdaw}?serverVersion=mariadb-10.11"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    profiles:
      - tools

volumes:
  db_data:
  php_var:
  uploads:

networks:
  backend:
  frontend:
