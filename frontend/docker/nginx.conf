server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip para assets estáticos
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Assets con hash en el nombre → caché agresiva (1 año)
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: cualquier ruta desconocida devuelve index.html para que React Router la gestione
    location / {
        try_files $uri $uri/ /index.html;
    }
}
